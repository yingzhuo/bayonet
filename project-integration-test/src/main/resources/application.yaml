# ----------------------------------------------------------------------------------------------------------------------
# Actuator
# ----------------------------------------------------------------------------------------------------------------------
spring:
  application:
    name: 'project-integration-test'
  banner:
    location: "classpath:config/banner.txt"

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    env:
      show-values: always
    shutdown:
      access: none
  info:
    env:
      enabled: true
    git:
      enabled: true
      mode: simple
    build:
      enabled: true
    os:
      enabled: true
    java:
      enabled: true
    ssl:
      enabled: true
    process:
      enabled: true
    defaults:
      enabled: true
  endpoints:
    web:
      base-path: "/actuator"
      exposure:
        include: [ "health", "info", "metrics", "env", "beans" ]
