plugins {
    id 'java-platform'
    id 'buildlogic.publish-conventions'
}

description = 'BOM'

javaPlatform {
    allowDependencies()
}

dependencies {
    constraints {
        rootProject.findProject('projects-main').subprojects { subproject ->
            if (subproject.name != 'bayonet-bom') {
                api project(path: subproject.path)
            }
        }

        api libs.jetbrains.annotation
        api libs.java.jwt
        api libs.hocon
        api libs.bundles.zxing

        // other bom
        api libs.bc.bom
        api libs.ayza.bom
    }
}
